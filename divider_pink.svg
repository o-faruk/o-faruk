<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 20" width="700" height="20">
  <defs>
    <linearGradient id="pulse-pink" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#FF2D78" stop-opacity="0.15"/>
      <stop offset="50%"  stop-color="#FF2D78" stop-opacity="1"/>
      <stop offset="52%"  stop-color="#FF2D78" stop-opacity="0.15"/>
      <stop offset="60%"  stop-color="#FF2D78" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF2D78" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow-p" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <line x1="0" y1="10" x2="700" y2="10" stroke="#FF2D78" stroke-width="0.4" opacity="0.2"/>
  <g fill="#FF2D78" opacity="0.35">
    <rect x="0"   y="6" width="1" height="8"/>
    <rect x="50"  y="7" width="1" height="6"/>
    <rect x="100" y="6" width="1" height="8"/>
    <rect x="150" y="7" width="1" height="6"/>
    <rect x="200" y="6" width="1" height="8"/>
    <rect x="250" y="7" width="1" height="6"/>
    <rect x="300" y="6" width="1" height="8"/>
    <rect x="350" y="5" width="2" height="10"/>
    <rect x="400" y="6" width="1" height="8"/>
    <rect x="450" y="7" width="1" height="6"/>
    <rect x="500" y="6" width="1" height="8"/>
    <rect x="550" y="7" width="1" height="6"/>
    <rect x="600" y="6" width="1" height="8"/>
    <rect x="650" y="7" width="1" height="6"/>
    <rect x="699" y="6" width="1" height="8"/>
  </g>
  <line x1="0" y1="10" x2="700" y2="10" stroke="url(#pulse-pink)" stroke-width="2" filter="url(#glow-p)"/>
</svg>
